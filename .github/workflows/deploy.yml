name: Build and deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env
        run: |
          mkdir -p cms
          echo "${{ secrets.ENV_CMS }}" > ./cms/.env

          # Compose interpolates ${DATABASE_*} for the Postgres service from a project .env file.
          grep -E '^DATABASE_' ./cms/.env > .env

      - name: Build docker images
        env:
          VITE_STRAPI_URL: ${{ secrets.VITE_STRAPI_URL }}
        run: |
          docker build -t web:latest -f web/Dockerfile.prod \
            --build-arg VITE_STRAPI_URL="${VITE_STRAPI_URL:-http://strapi:1337}" .
          docker build -t strapi:latest -f cms/Dockerfile.prod .

      - name: Save docker images to tarball
        run: |
          docker save -o app-images.tar web:latest strapi:latest

      - name: Copy files to server
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_KEY }}
          passphrase: ${{ secrets.SERVER_PASSPHRASE }}
          source: "app-images.tar,compose.prod.yml,cms/.env,.env"
          target: "~/deploy/nexus"

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_KEY }}
          passphrase: ${{ secrets.SERVER_PASSPHRASE }}
          script: |
            set -e

            cd ~/deploy/nexus || {
              echo "Project directory not found. Cloning repository . . ."
              git clone https://github.com/mupinnn/WebClient-Kelompok1.git ~/deploy/nexus
              cd ~/deploy/nexus
            }

            git pull origin main || true

            echo "Loading docker images . . ."
            docker load -i app-images.tar

            echo "Restarting services . . ."
            docker compose -f compose.prod.yml up -d --no-build --force-recreate

            rm app-images.tar

            docker image prune -f
