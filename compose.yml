services:
  strapi:
    container_name: strapi
    build:
      context: .
      dockerfile: ./cms/Dockerfile
    image: strapi:latest
    restart: unless-stopped
    env_file: ./cms/.env # All variables from .env are injected into the container
    volumes:
      - ./cms/config:/opt/app/cms/config
      - ./cms/src:/opt/app/cms/src
      - ./cms/package.json:/opt/app/cms/package.json
      - ./package-lock.json:/opt/package-lock.json
      - ./cms/.env:/opt/app/cms/.env # Needed because Strapi uses dotenv to read .env in development
      - ./cms/public/uploads:/opt/app/cms/public/uploads
    ports:
      - "1338:1338"
    networks:
      - strapi
    depends_on:
      strapiDB:
        condition: service_healthy

  strapiDB:
    container_name: strapiDB
    restart: unless-stopped
    image: postgres:16-alpine
    env_file: ./cms/.env
    volumes:
      - strapi-data:/var/lib/postgresql/data/
    ports:
      - "5433:5432" # Host port 5433 maps to Postgres default 5432 inside the container
    networks:
      - strapi
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U ${DATABASE_USERNAME} -d ${DATABASE_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  strapi-data:

networks:
  strapi:
    name: strapi
    driver: bridge
