services:
  web:
    container_name: web
    build:
      context: .
      dockerfile: ./web/Dockerfile.prod
      args:
        VITE_STRAPI_URL: ${VITE_STRAPI_URL:-http://strapi:1337}
    image: web:latest
    restart: always
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3030
    ports:
      - "127.0.0.1:3030:3030"
    networks:
      - strapi

  strapi:
    container_name: strapi
    build:
      context: .
      dockerfile: ./cms/Dockerfile.prod
    image: strapi:latest
    restart: always
    env_file: ./cms/.env
    environment:
      NODE_ENV: production # Overrides the development value from .env
      PORT: 1337
    ports:
      - "127.0.0.1:1337:1337"
    networks:
      - strapi
    depends_on:
      strapiDB:
        condition: service_healthy

  strapiDB:
    container_name: strapiDB
    restart: always
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DATABASE_USERNAME}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME}
    volumes:
      - strapi-data:/var/lib/postgresql/data/
    networks:
      - strapi
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U ${DATABASE_USERNAME} -d ${DATABASE_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  strapi-data:

networks:
  strapi:
    name: strapi
    driver: bridge
